<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: Arial; text-align: center; padding-top: 50px; }
        .login-box, .admin-box { background: #1a1a1a; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; }
        input, button { padding: 10px; margin: 10px; width: 90%; border-radius: 10px; border: none; }
        button { background: #d8b26e; cursor: pointer; font-weight: bold; }
        .error { color: red; }
        .menu-edit { background: #252525; padding: 10px; margin: 10px; border-radius: 10px; }
        .price-input { width: 80px; }
        #adminContainer { display: none; }
    </style>
</head>
<body>

<div id="loginContainer">
    <div class="login-box">
        <h2>🔐 Admin Login</h2>
        <input type="password" id="passwordInput" placeholder="Passwort">
        <button onclick="checkPassword()">Login</button>
        <div id="errorMsg" class="error"></div>
    </div>
</div>

<div id="adminContainer">
    <div class="admin-box">
        <h2>🛠️ Admin Panel</h2>
        <div id="menuList"></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "admin123";

    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === ADMIN_PASSWORD) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            loadMenu();
        } else {
            document.getElementById('errorMsg').innerText = 'Falsches Passwort';
        }
    }

    function logout() {
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('adminContainer').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').innerText = '';
    }

    function loadMenu() {
        document.getElementById('menuList').innerHTML = `
            <div class="menu-edit">🧇 Favorite Waffel - <input type="text" class="price-input" id="p1" value="8.50"> € <button onclick="save('p1')">Speichern</button> <span id="s1"></span></div>
            <div class="menu-edit">🥞 Sweet Favorite - <input type="text" class="price-input" id="p2" value="8.50"> € <button onclick="save('p2')">Speichern</button> <span id="s2"></span></div>
            <div class="menu-edit">🧀 Ham Cheese - <input type="text" class="price-input" id="p3" value="7.00"> € <button onclick="save('p3')">Speichern</button> <span id="s3"></span></div>
        `;
    }

    function save(id) {
        let price = document.getElementById(id).value;
        let num = id.slice(1);
        document.getElementById('s' + num).innerText = '✅ ' + price + ' €';
        setTimeout(() => { document.getElementById('s' + num).innerText = ''; }, 2000);
    }
</script>

</body>
</html>
